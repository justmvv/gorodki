name: Deploy PWA to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # The build number in the main menu becomes date + CI run number,
      # so every deploy is immediately identifiable in the app itself.
      - name: Stamp build number
        run: |
          BUILD="$(date -u +%Y.%m.%d)+ci.${{ github.run_number }}"
          sed -i "s/const String appBuild = '.*';/const String appBuild = '$BUILD';/" lib/core/version.dart
          echo "Stamped build: $BUILD"

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release

      - name: Deploy to Cloudflare Workers (static assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
